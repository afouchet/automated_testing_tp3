<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <style>
    body { font-family: Georgia, serif; background: #f7f5f2; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border: 1px solid #e0dbd4; border-radius: 4px; padding: 2.5rem; width: 100%; max-width: 400px; }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.3rem; }
    input { width: 100%; padding: 0.6rem 0.8rem; border: 1.5px solid #ccc; border-radius: 3px; font-size: 1rem; margin-bottom: 1rem; box-sizing: border-box; }
    button { padding: 0.7rem 2rem; background: #1a1a1a; color: #fff; border: none; border-radius: 3px; font-size: 1rem; cursor: pointer; }
    .error { color: #c0392b; font-size: 0.85rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login</h1>
    {% if form.errors %}
      <p class="error">Invalid username or password.</p>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <label for="id_username">Username</label>
      <input type="text" id="id_username" name="username" autofocus />
      <label for="id_password">Password</label>
      <input type="password" id="id_password" name="password" />
      <input type="hidden" name="next" value="{{ next }}" />
      <button type="submit">Log in</button>
    </form>
  </div>
</body>
</html>
